{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<style>
    /* Auth Page Styles (Consistent with Login/Register) */
    .auth-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-lg) var(--spacing-sm);
        background-color: var(--color-black);
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(212, 175, 55, 0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
    }

    .auth-card {
        width: 100%;
        max-width: 440px;
        background-color: var(--color-dark-grey);
        border: 1px solid var(--color-medium-grey);
        border-top: 4px solid var(--color-gold);
        border-radius: var(--radius-md);
        padding: var(--spacing-lg);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        position: relative;
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--spacing-lg);
    }

    .auth-header h1 {
        font-family: var(--font-heading);
        font-size: 2.5rem;
        color: var(--color-gold);
        margin-bottom: 0.5rem;
        letter-spacing: 2px;
    }

    .auth-header p {
        color: var(--color-light-grey);
        font-size: 0.95rem;
    }

    .auth-form .form-group {
        margin-bottom: var(--spacing-md);
        position: relative;
    }

    .input-group { position: relative; width: 100%; }

    .input-group > i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-grey);
        transition: color 0.3s ease;
        z-index: 2;
        pointer-events: none;
    }

    .form-control {
        width: 100%;
        padding: 1rem 1rem 1rem 3rem; /* Space for icon */
        background-color: var(--color-black);
        border: 1px solid var(--color-medium-grey);
        border-radius: var(--radius-sm);
        color: var(--color-white);
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--color-gold);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .form-control:focus ~ i { color: var(--color-gold); }
    .form-control::placeholder { color: var(--color-grey); opacity: 0.7; }

    .btn-auth {
        width: 100%;
        padding: 1rem;
        background: var(--color-gold);
        color: var(--color-black);
        border: none;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: var(--spacing-sm);
    }

    .btn-auth:hover {
        background: var(--color-gold-light);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        transform: translateY(-2px);
    }

    .auth-footer {
        text-align: center;
        margin-top: var(--spacing-lg);
        color: var(--color-light-grey);
        font-size: 0.95rem;
        border-top: 1px solid var(--color-charcoal);
        padding-top: var(--spacing-md);
    }
    .auth-footer a {
        color: var(--color-gold);
        font-weight: 600;
        text-decoration: none;
    }

    @media (max-width: 480px) {
        .auth-card { padding: var(--spacing-md); }
        .auth-header h1 { font-size: 2rem; }
    }
</style>

<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Forgot Password</h1>
            <p>Enter your username to generate a reset link.</p>
        </div>

        <form class="auth-form" method="POST" action="{{ url_for('auth.forgot_password') }}">
            <!-- Username -->
            <div class="form-group">
                <div class="input-group">
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div class="auth-footer">
            Remember your password? <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
    </div>
</section>
{% endblock %}
